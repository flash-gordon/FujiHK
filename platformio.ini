[env:m5stack-atoms3]
platform = espressif32
board = m5stack-atoms3
framework = arduino
monitor_speed = 115200
build_flags =
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
	FujiHeatPump=https://github.com/unreality/FujiHeatPump.git
	HomeSpan=https://github.com/HomeSpan/HomeSpan.git#release-1.9.1
